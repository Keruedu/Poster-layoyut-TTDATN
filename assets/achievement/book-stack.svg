<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="hexClip">
      <path d="M 150,25 L 258.25,87.5 L 258.25,212.5 L 150,275 L 41.75,212.5 L 41.75,87.5 Z" />
    </clipPath>
    <linearGradient id="pageGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f2f2f2"/>
      <stop offset="100%" stop-color="#d6d6d6"/>
    </linearGradient>
    <radialGradient id="appleGradient" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff7559"/>
      <stop offset="60%" stop-color="#f54f36"/>
      <stop offset="100%" stop-color="#d9331a"/>
    </radialGradient>

    <style>
      @keyframes floatBookPurple {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }
      @keyframes floatBookCyan {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes floatApple {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-14px); }
      }
      @keyframes leafWiggle {
        0%, 100% { transform: rotate(0deg); }
        30% { transform: rotate(10deg); }
        70% { transform: rotate(-5deg); }
      }
      @keyframes shadowPulse {
        0%, 100% { transform: scaleX(1) scaleY(1); opacity: 0.5; }
        50% { transform: scaleX(0.85) scaleY(0.9); opacity: 0.2; }
      }
      .book-purple {
        animation: floatBookPurple 4s ease-in-out infinite;
        transform-origin: center;
      }
      .book-cyan {
        animation: floatBookCyan 4s ease-in-out infinite;
        transform-origin: center;
      }
      .apple {
        animation: floatApple 4s ease-in-out infinite;
        transform-origin: center;
      }
      .leaf-group {
        animation: leafWiggle 4s ease-in-out infinite;
        transform-origin: 153px 88px;
      }
      .stack-shadow {
        animation: shadowPulse 4s ease-in-out infinite;
        transform-origin: 160px 215px;
      }
    </style>
  </defs>

  <!-- Hexagon background -->
  <path d="M 150,25 L 258.25,87.5 L 258.25,212.5 L 150,275 L 41.75,212.5 L 41.75,87.5 Z" fill="#fbead9" />

  <g clip-path="url(#hexClip)">
    <!-- Decorative blocks -->
    <rect x="50" y="90" width="55" height="15" fill="#ffffff" opacity="0.6" rx="2" />
    <rect x="180" y="45" width="45" height="15" fill="#ffffff" opacity="0.6" rx="2" />
    <rect x="35" y="160" width="40" height="15" fill="#ffffff" opacity="0.6" rx="2" />
    <rect x="220" y="120" width="60" height="15" fill="#ffffff" opacity="0.4" rx="2" />
    <rect x="240" y="180" width="30" height="15" fill="#ffffff" opacity="0.4" rx="2" />

    <!-- Shelf -->
    <rect x="0" y="215" width="300" height="20" fill="#fbb05a" />
    <rect x="0" y="235" width="300" height="65" fill="#e68822" />

    <!-- Shadow -->
    <ellipse cx="160" cy="215" rx="75" ry="8" fill="#c4761f" class="stack-shadow" />

    <!-- Purple book -->
    <g class="book-purple">
      <path d="M 225,175 a 5,5 0 0 1 5,5 v 30 a 5,5 0 0 1 -5,5 H 90 a 20,20 0 0 1 0,-40 Z" fill="#b953eb" />
      <path d="M 90,175 a 20,20 0 0 0 0,40" stroke="#a03ccc" stroke-width="4" fill="none" opacity="0.4" />
      <path d="M 110,185 H 225 a 3,3 0 0 1 3,3 v 14 a 3,3 0 0 1 -3,3 H 110 C 120,205 120,185 110,185 Z" fill="url(#pageGradient)" />
    </g>

    <!-- Cyan book -->
    <g class="book-cyan">
      <path d="M 205,145 a 5,5 0 0 1 5,5 v 20 a 5,5 0 0 1 -5,5 H 100 a 15,15 0 0 1 0,-30 Z" fill="#4fd6e0" />
      <path d="M 100,145 a 15,15 0 0 0 0,30" stroke="#35b4bd" stroke-width="3" fill="none" opacity="0.4" />
      <path d="M 115,152 H 205 a 3,3 0 0 1 3,3 v 10 a 3,3 0 0 1 -3,3 H 115 C 122,168 122,152 115,152 Z" fill="url(#pageGradient)" />
    </g>

    <!-- Apple -->
    <g class="apple">
      <path d="M 148,105 Q 145,85 155,80" stroke="#38528a" stroke-width="5" stroke-linecap="round" fill="none" />
      <g class="leaf-group">
        <path d="M 153,88 C 160,75, 180,75, 180,85 C 180,100, 160,100, 153,88 Z" fill="#94e354" />
        <path d="M 153,88 Q 163,88 172,85" stroke="#68b82e" stroke-width="2" stroke-linecap="round" fill="none" />
      </g>
      <path d="M 150 145 C 170 150, 185 130, 175 110 C 168 95, 155 100, 150 105 C 145 100, 132 95, 125 110 C 115 130, 130 150, 150 145 Z" fill="url(#appleGradient)" />
      <path d="M 132 115 Q 128 128 138 135" stroke="#ffa394" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.6" />
    </g>
  </g>

  <!-- Hex border -->
  <path d="M 150,25 L 258.25,87.5 L 258.25,212.5 L 150,275 L 41.75,212.5 L 41.75,87.5 Z"
        fill="none" stroke="#ffffff" stroke-width="12" stroke-linejoin="round" />
</svg>
